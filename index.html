<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Drill Library</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.section{
margin-bottom:50px;
}

.section-title{
font-size:26px;
margin-bottom:20px;
border-bottom:3px solid #ddd;
padding-bottom:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.video-card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.video-label{
font-weight:bold;
margin-bottom:14px;
font-size:15px;
min-height:40px;
}

.button{
display:inline-block;
padding:11px 16px;
border-radius:6px;
color:white;
text-decoration:none;
font-weight:bold;
}

.youtube{background:#ff0000;}
.facebook{background:#1877f2;}
.instagram{background:#e1306c;}

.button:hover{
opacity:.85;
}

</style>
</head>

<body>

<h1>Golf Drill Library</h1>

<div id="library"></div>

<script>

const drillList = `

"New Ones To Try"
Shoulder - https://www.facebook.com/share/r/1BifyXN4MN/
Step & stretch - https://www.facebook.com/share/r/1AsX6MFiHM/
Swing thoughts for knee - https://www.facebook.com/share/r/17A17TxKa2/
Stick under arm - https://www.facebook.com/share/r/18C8KNsT5s/
Compression Load Foot - https://www.facebook.com/share/r/18CNtqXDmu/
MIT drill - https://www.facebook.com/share/r/1AmwB3pgJE/
Hips - https://www.facebook.com/share/r/17oRo2jBv8/
Chipping - https://www.facebook.com/share/r/17xozQ9UJB/
Weight Shift - https://www.facebook.com/share/r/16qGJYwMzZ/
Pumping Drill - https://www.facebook.com/share/r/1GRKdyogqN/
Drag Hands Drill - https://www.facebook.com/share/r/1DBA7YoDUj/

"Stick Drills"
Early Extension (Stick) - https://www.facebook.com/share/r/1C3ifTvfNJ/
Shoulders (Stick) - https://www.facebook.com/share/r/1BfbG992GG/
Side Bending (Sticks) - https://www.facebook.com/share/v/1DM4U4N2xJ/
Stay down (Stick Drill) - https://www.facebook.com/share/r/1BvBY6XJQB/
Timing Drill - Stick In Belt Loops - https://youtube.com/shorts/rs3F2hvJuFc?si=B1sp1xYhI5t9OdE8

"Compression Drills"
Compression Position Drill - https://www.facebook.com/share/v/1AMveCXnvh/
Compression Feels Like - https://youtube.com/shorts/J6DSw7Z-fQs?si=wx_0DE_SjfUm3aDg
Compression - https://www.facebook.com/share/r/1YgX8mCUpJ/
Compression Drill - https://www.facebook.com/share/r/1A3zPZ5z1k/
Compression Drill - https://youtube.com/shorts/qx-q3Dtg4DI?si=8i52PwDBsIl55n05

`;

const container = document.getElementById("library");

let currentSection;
let currentGrid;

drillList.trim().split("\n").forEach(line=>{

line=line.trim();
if(!line) return;

if(line.startsWith('"')){

const title=line.replace(/"/g,"");

currentSection=document.createElement("div");
currentSection.className="section";

const heading=document.createElement("div");
heading.className="section-title";
heading.textContent=title;

currentGrid=document.createElement("div");
currentGrid.className="grid";

currentSection.appendChild(heading);
currentSection.appendChild(currentGrid);
container.appendChild(currentSection);

return;
}

const parts=line.split(" - ");
if(parts.length<2) return;

const label=parts[0].trim();
const url=parts.slice(1).join(" - ").trim();

let platformClass="";
let buttonText="Watch Video";

if(url.includes("youtube")){
platformClass="youtube";
buttonText="Watch on YouTube";
}
else if(url.includes("facebook")){
platformClass="facebook";
buttonText="Watch on Facebook";
}
else if(url.includes("instagram")){
platformClass="instagram";
buttonText="Watch on Instagram";
}

const card=document.createElement("div");
card.className="video-card";

card.innerHTML=`
<div class="video-label">${label}</div>
<a href="${url}" target="_blank" class="button ${platformClass}">
${buttonText}
</a>
`;

currentGrid.appendChild(card);

});

</script>

</body>
</html>
